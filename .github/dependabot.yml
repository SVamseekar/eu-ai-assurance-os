version: 2
updates:
  - package-ecosystem: maven
    directory: /services/api
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      maven-minor:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /apps/dashboard
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      dashboard-minor:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
