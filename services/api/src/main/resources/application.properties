spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
spring.jackson.mapper.accept-case-insensitive-enums=true
spring.datasource.url=jdbc:h2:mem:eu_ai_assurance;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
assurance.evidence.embedding-provider=local-hash
assurance.evidence.max-content-characters=200000
assurance.evidence.max-metadata-entries=25
assurance.evidence.max-metadata-value-characters=1000
assurance.evidence.max-question-characters=2048
assurance.evidence.max-retrieved-chunks=3
assurance.evidence.min-retrieval-score=0.20
assurance.evidence.allowed-source-schemes=memory,s3,gs,https
assurance.eval.worker.enabled=true
assurance.eval.worker.poll-interval-ms=5000
assurance.eval.callback.secret=${EVAL_CALLBACK_SECRET:}
assurance.eval.callback.signature-tolerance-seconds=300
assurance.audit.chain-secret=${AUDIT_CHAIN_SECRET:local-dev-audit-chain-secret}
assurance.audit.retention-years=7
assurance.evidence-pack.generator=eu-ai-assurance-api/0.1.0
# Certification readiness (Part 13) — score + gaps only; never legal certification
assurance.certification-readiness.ready-for-review-threshold=90
assurance.certification-readiness.not-ready-score-floor=50
assurance.certification-readiness.evidence-pass-threshold=82
assurance.certification-readiness.eval-pass-threshold=85
assurance.certification-readiness.eval-hard-block-threshold=78
assurance.certification-readiness.weight-risk=10
assurance.certification-readiness.weight-controls=15
assurance.certification-readiness.weight-evidence=15
assurance.certification-readiness.weight-eval=15
assurance.certification-readiness.weight-contracts=10
assurance.certification-readiness.weight-approvals=10
assurance.certification-readiness.weight-oversight=10
assurance.certification-readiness.weight-determination=10
assurance.certification-readiness.weight-audit-chain=5
# Regulatory change monitoring (Part 14) — polled assistive feed, not official legal bulletin
assurance.reg-monitor.enabled=true
assurance.reg-monitor.poll-interval-ms=60000
assurance.reg-monitor.bootstrap-fixtures=true
assurance.reg-monitor.max-fetch-characters=2000000
assurance.reg-monitor.connect-timeout-seconds=10
assurance.reg-monitor.response-timeout-seconds=30
# Sector packs (Part 15) — SPI + insurance/hr/finance verticals; not all industries / no live vendors
assurance.sector.packs=insurance,hr,finance
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
# Histogram buckets for NFR latency timers (p95 via Prometheus quantile queries — not unit-test SLOs)
management.metrics.distribution.percentiles-histogram.assurance.api.registry.read=true
management.metrics.distribution.percentiles-histogram.assurance.api.evidence.query=true
# Object storage (S3 / MinIO). Disabled by default; see docs/DEPLOYMENT.md Part 9.
assurance.storage.enabled=${ASSURANCE_STORAGE_ENABLED:false}
assurance.storage.bucket=${ASSURANCE_STORAGE_BUCKET:eu-ai-assurance-evidence}
assurance.storage.region=${ASSURANCE_STORAGE_REGION:eu-west-1}
assurance.storage.endpoint=${ASSURANCE_STORAGE_ENDPOINT:}
assurance.storage.access-key-id=${ASSURANCE_STORAGE_ACCESS_KEY_ID:}
assurance.storage.secret-access-key=${ASSURANCE_STORAGE_SECRET_ACCESS_KEY:}
# Optional path-style override via ASSURANCE_STORAGE_PATH_STYLE (true/false).
# When unset, path-style is auto-enabled whenever endpoint is non-blank (MinIO).

# OAuth / OIDC (Part 4). auto-provision MUST stay false in production unless intentionally opened.
assurance.oauth.auto-provision=${OAUTH_AUTO_PROVISION:false}
assurance.oauth.redirect-base-url=${OAUTH_REDIRECT_BASE_URL:http://localhost:3000}
assurance.oauth.state-secret=${OAUTH_STATE_SECRET:${AUDIT_CHAIN_SECRET:local-dev-oauth-state-secret}}
assurance.oauth.google.client-id=${OAUTH_GOOGLE_CLIENT_ID:}
assurance.oauth.google.client-secret=${OAUTH_GOOGLE_CLIENT_SECRET:}
assurance.oauth.microsoft.client-id=${OAUTH_MICROSOFT_CLIENT_ID:}
assurance.oauth.microsoft.client-secret=${OAUTH_MICROSOFT_CLIENT_SECRET:}
