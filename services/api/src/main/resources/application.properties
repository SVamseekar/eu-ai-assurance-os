spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
spring.jackson.mapper.accept-case-insensitive-enums=true
spring.datasource.url=jdbc:h2:mem:eu_ai_assurance;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
assurance.evidence.embedding-provider=local-hash
assurance.evidence.max-content-characters=200000
assurance.evidence.max-metadata-entries=25
assurance.evidence.max-metadata-value-characters=1000
assurance.evidence.max-question-characters=2048
assurance.evidence.max-retrieved-chunks=3
assurance.evidence.min-retrieval-score=0.20
assurance.evidence.allowed-source-schemes=memory,s3,gs,https
assurance.eval.worker.enabled=true
assurance.eval.worker.poll-interval-ms=5000
assurance.eval.callback.secret=${EVAL_CALLBACK_SECRET:}
assurance.eval.callback.signature-tolerance-seconds=300
assurance.audit.chain-secret=${AUDIT_CHAIN_SECRET:local-dev-audit-chain-secret}
assurance.audit.retention-years=7
assurance.evidence-pack.generator=eu-ai-assurance-api/0.1.0
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
# Histogram buckets for NFR latency timers (p95 via Prometheus quantile queries — not unit-test SLOs)
management.metrics.distribution.percentiles-histogram.assurance.api.registry.read=true
management.metrics.distribution.percentiles-histogram.assurance.api.evidence.query=true
# Object storage (S3 / MinIO). Disabled by default; see docs/DEPLOYMENT.md Part 9.
assurance.storage.enabled=${ASSURANCE_STORAGE_ENABLED:false}
assurance.storage.bucket=${ASSURANCE_STORAGE_BUCKET:eu-ai-assurance-evidence}
assurance.storage.region=${ASSURANCE_STORAGE_REGION:eu-west-1}
assurance.storage.endpoint=${ASSURANCE_STORAGE_ENDPOINT:}
assurance.storage.access-key-id=${ASSURANCE_STORAGE_ACCESS_KEY_ID:}
assurance.storage.secret-access-key=${ASSURANCE_STORAGE_SECRET_ACCESS_KEY:}
# Optional path-style override via ASSURANCE_STORAGE_PATH_STYLE (true/false).
# When unset, path-style is auto-enabled whenever endpoint is non-blank (MinIO).
