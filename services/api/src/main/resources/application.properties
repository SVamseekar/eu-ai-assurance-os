spring.jackson.mapper.accept-case-insensitive-enums=true
spring.datasource.url=jdbc:h2:mem:eu_ai_assurance;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
assurance.evidence.embedding-provider=local-hash
assurance.evidence.max-content-characters=200000
assurance.evidence.max-metadata-entries=25
assurance.evidence.max-metadata-value-characters=1000
assurance.evidence.max-question-characters=2048
assurance.evidence.max-retrieved-chunks=3
assurance.evidence.min-retrieval-score=0.20
assurance.evidence.allowed-source-schemes=memory,s3,gs,https
assurance.eval.worker.enabled=true
assurance.eval.worker.poll-interval-ms=5000
assurance.eval.callback.secret=${EVAL_CALLBACK_SECRET:}
assurance.eval.callback.signature-tolerance-seconds=300
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
assurance.storage.enabled=false
assurance.storage.bucket=eu-ai-assurance-evidence
assurance.storage.region=eu-west-1
