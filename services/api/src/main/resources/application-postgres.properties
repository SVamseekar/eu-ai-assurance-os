spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/eu_ai_assurance}
spring.datasource.username=${DATABASE_USERNAME:eu_ai_assurance}
spring.datasource.password=${DATABASE_PASSWORD:eu_ai_assurance}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.locations=classpath:db/migration,classpath:db/postgresql
assurance.evidence.embedding-provider=${EVIDENCE_EMBEDDING_PROVIDER:local-hash}
assurance.eval.callback.secret=${EVAL_CALLBACK_SECRET:}
